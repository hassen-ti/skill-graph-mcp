<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Skill Graph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  :root {
    --bg:       #0f0e0a;
    --surface:  #1a1812;
    --surface2: #252218;
    --border:   #2e2b1e;
    --accent:   #e8b84b;
    --text:     #f0e8cc;
    --text-dim: #d4c9a8;
    --muted:    #7a7560;
    --faint:    #4a4535;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 13px;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  #sidebar {
    width: 300px;
    min-width: 300px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 10;
  }

  #sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }

  #sidebar-header h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 4px;
  }

  #sidebar-header .meta { color: var(--muted); font-size: 11px; }

  #search-wrap {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  #search {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 7px 10px;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--faint); }

  #search-results {
    position: absolute;
    left: 16px; right: 16px;
    top: calc(100% - 12px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 6px 6px;
    max-height: 200px;
    overflow-y: auto;
    z-index: 20;
    display: none;
  }
  #search-results.visible { display: block; }

  .search-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    cursor: pointer;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .search-item:hover { background: var(--surface2); }
  .search-item .cluster-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  #legend {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  #legend h3, #edge-controls h3 {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 6px;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.15s;
  }
  .legend-item:hover { background: var(--surface2); }
  .legend-item.dimmed { opacity: 0.35; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-label { color: var(--text-dim); flex: 1; font-size: 12px; }
  .legend-count { color: var(--faint); font-size: 11px; }

  #edge-controls {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  .edge-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 6px;
    cursor: pointer;
    border-radius: 4px;
  }
  .edge-toggle:hover { background: var(--surface2); }
  .edge-toggle input[type=checkbox] { accent-color: var(--accent); cursor: pointer; }
  .edge-swatch { width: 24px; height: 2px; border-radius: 1px; }
  .edge-label { color: var(--text-dim); font-size: 12px; }

  #detail {
    flex: 1;
    padding: 14px 16px;
    overflow-y: auto;
  }

  #detail-placeholder { color: var(--faint); font-style: italic; margin-top: 8px; }
  #detail-content { display: none; }
  #detail-content.visible { display: block; }

  #detail-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    word-break: break-word;
  }

  #detail-cluster {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 10px;
    background: var(--surface2);
    padding: 3px 8px;
    border-radius: 12px;
  }

  #detail-desc {
    color: var(--muted);
    line-height: 1.55;
    margin-bottom: 12px;
    font-size: 12px;
  }

  .detail-section { display: none; }
  .detail-section.visible { display: block; }

  .detail-section h4 {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
    margin-top: 12px;
  }

  .tag-list { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 4px; }

  .tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 11px;
  }

  .neighbor-list { display: flex; flex-direction: column; gap: 3px; }

  .neighbor-item {
    cursor: pointer;
    color: var(--accent);
    padding: 3px 6px;
    border-radius: 4px;
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .neighbor-item:hover { background: var(--surface2); text-decoration: underline; }

  .neighbor-more { color: var(--faint); font-size: 11px; padding: 4px 6px; }

  #canvas-wrap { flex: 1; position: relative; overflow: hidden; }

  svg#graph { width: 100%; height: 100%; cursor: grab; }
  svg#graph:active { cursor: grabbing; }

  .node circle { stroke-width: 1.5; cursor: pointer; }
  .node text {
    pointer-events: none;
    fill: var(--text);
    font-size: 10px;
    text-anchor: middle;
    dominant-baseline: middle;
    paint-order: stroke;
    stroke: #0f0e0a;
    stroke-width: 3px;
  }

  #status {
    position: absolute;
    bottom: 12px;
    right: 16px;
    color: var(--faint);
    font-size: 11px;
    pointer-events: none;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>Skill Graph</h1>
    <div class="meta" id="meta-line">Loading...</div>
  </div>

  <div id="search-wrap">
    <input id="search" type="text" placeholder="Search skills…" autocomplete="off">
    <div id="search-results"></div>
  </div>

  <div id="legend">
    <h3>Clusters</h3>
    <div id="legend-items"></div>
  </div>

  <div id="edge-controls">
    <h3>Edges</h3>
    <label class="edge-toggle">
      <input type="checkbox" id="toggle-related" checked>
      <div class="edge-swatch" style="background:#e8b84b"></div>
      <span class="edge-label">Related</span>
    </label>
    <label class="edge-toggle">
      <input type="checkbox" id="toggle-shared" checked>
      <div class="edge-swatch" style="background:#4a4535"></div>
      <span class="edge-label">Shared keywords</span>
    </label>
  </div>

  <div id="detail">
    <div id="detail-placeholder">Click a node to see details</div>
    <div id="detail-content">
      <div id="detail-name"></div>
      <div id="detail-cluster">
        <div id="detail-cluster-dot" class="legend-dot"></div>
        <span id="detail-cluster-name"></span>
      </div>
      <div id="detail-desc"></div>
      <div class="detail-section" id="detail-caps-section">
        <h4>Capabilities</h4>
        <div class="tag-list" id="detail-caps"></div>
      </div>
      <div class="detail-section" id="detail-reqs-section">
        <h4>Requirements</h4>
        <div class="tag-list" id="detail-reqs"></div>
      </div>
      <div class="detail-section" id="detail-neighbors-section">
        <h4>Connected skills</h4>
        <div class="neighbor-list" id="detail-neighbors"></div>
      </div>
    </div>
  </div>
</div>

<div id="canvas-wrap">
  <svg id="graph"></svg>
  <div id="status"></div>
</div>

<script type="application/json" id="graph-data">
__GRAPH_DATA_PLACEHOLDER__
</script>

<script>
const GRAPH = JSON.parse(document.getElementById("graph-data").textContent);

const COLOR_PALETTE = [
  "#e8b84b","#d95f4b","#5cac78","#6aabe0","#b87dd4",
  "#e87c30","#4ab8a8","#d4a843","#a0c45a","#e06b9a",
  "#7aa8e8","#c4845a","#8adb8a","#e8a07a","#a07ad4",
];
const colorScale = d3.scaleOrdinal(COLOR_PALETTE);
function clusterColor(c) {
  if (c == null || c === -1) return "#4a4535";
  return colorScale(String(c));
}

// ── DOM refs ──────────────────────────────────────────────
const svgEl    = document.getElementById("graph");
const statusEl = document.getElementById("status");

// Meta
const { total_nodes, total_edges, clusters, n_communities } = GRAPH.meta;
const hasUMAP = GRAPH.nodes.some(n => n.umap_x != null);
document.getElementById("meta-line").textContent =
  total_nodes + " skills · " + total_edges + " edges" +
  (n_communities ? " · " + n_communities + " communities" : "");

// ── Legend ────────────────────────────────────────────
const hiddenCommunities = new Set();
const legendContainer   = document.getElementById("legend-items");

function buildLegend() {
  if (n_communities) {
    const counts = {};
    GRAPH.nodes.forEach(n => {
      const c = n.community ?? -1;
      counts[c] = (counts[c] || 0) + 1;
    });
    Object.entries(counts)
      .sort((a, b) => b[1] - a[1])
      .forEach(([c, count]) => {
        const item = document.createElement("div");
        item.className = "legend-item";
        item.dataset.community = c;

        const dot = document.createElement("div");
        dot.className = "legend-dot";
        dot.style.background = clusterColor(+c);

        const lbl = document.createElement("span");
        lbl.className = "legend-label";
        lbl.textContent = c === "-1" ? "unassigned" : "cluster " + c;

        const cnt = document.createElement("span");
        cnt.className = "legend-count";
        cnt.textContent = count;

        item.appendChild(dot); item.appendChild(lbl); item.appendChild(cnt);
        item.addEventListener("click", () => toggleCommunity(+c, item));
        legendContainer.appendChild(item);
      });
  } else {
    Object.entries(clusters)
      .sort((a, b) => b[1] - a[1])
      .forEach(([name, count]) => {
        const item = document.createElement("div");
        item.className = "legend-item";
        item.dataset.community = name;

        const dot = document.createElement("div");
        dot.className = "legend-dot";
        dot.style.background = clusterColor(name);

        const lbl = document.createElement("span");
        lbl.className = "legend-label";
        lbl.textContent = name;

        const cnt = document.createElement("span");
        cnt.className = "legend-count";
        cnt.textContent = count;

        item.appendChild(dot); item.appendChild(lbl); item.appendChild(cnt);
        item.addEventListener("click", () => toggleCommunity(name, item));
        legendContainer.appendChild(item);
      });
  }
}
buildLegend();

function nodeComm(d) { return n_communities ? (d.community ?? -1) : d.cluster; }

function toggleCommunity(val, el) {
  if (hiddenCommunities.has(val)) {
    hiddenCommunities.delete(val);
    el.classList.remove("dimmed");
  } else {
    hiddenCommunities.add(val);
    el.classList.add("dimmed");
  }
  applyVisibility();
}

function applyVisibility() {
  nodeGroup.selectAll(".node")
    .style("opacity", d => hiddenCommunities.has(nodeComm(d)) ? 0.05 : 1);
  linkGroup.selectAll(".edge")
    .style("opacity", d => edgeOpacity(d, true));
}

// ── Edge toggles ────────────────────────────────────────────
const showEdgeTypes = { related: true, "shared-tag": true };

document.getElementById("toggle-related").addEventListener("change", e => {
  showEdgeTypes.related = e.target.checked;
  linkGroup.selectAll(".edge").style("opacity", d => edgeOpacity(d, true));
});
document.getElementById("toggle-shared").addEventListener("change", e => {
  showEdgeTypes["shared-tag"] = e.target.checked;
  linkGroup.selectAll(".edge").style("opacity", d => edgeOpacity(d, true));
});

function edgeOpacity(d, respectCluster) {
  if (!showEdgeTypes[d.type]) return 0;
  if (respectCluster) {
    const s = d.source.id || d.source;
    const t = d.target.id || d.target;
    const sn = nodeById.get(s), tn = nodeById.get(t);
    if (!sn || !tn) return 0;
    if (hiddenCommunities.has(nodeComm(sn)) || hiddenCommunities.has(nodeComm(tn))) return 0;
  }
  return d.type === "related" ? 0.75 : 0.22;
}

// ── D3 setup ────────────────────────────────────────────
const width  = svgEl.clientWidth  || (window.innerWidth - 300);
const height = svgEl.clientHeight || window.innerHeight;

const svg = d3.select("#graph");
const zoomBehavior = d3.zoom().scaleExtent([0.04, 10]).on("zoom", e => {
  container.attr("transform", e.transform);
  const k = e.transform.k;
  nodeGroup.selectAll(".node text")
    .style("display", k > 2 ? null : "none");
});
svg.call(zoomBehavior);

const container = svg.append("g");
const linkGroup = container.append("g").attr("class", "links");
const nodeGroup = container.append("g").attr("class", "nodes");

function nodeRadius(d) { return 4 + Math.log1p(d.degree) * 2.2; }

const nodeById = new Map(GRAPH.nodes.map(n => [n.id, n]));

const neighbors = new Map();
GRAPH.nodes.forEach(n => neighbors.set(n.id, new Set()));
GRAPH.edges.forEach(e => {
  const s = e.source.id || e.source;
  const t = e.target.id || e.target;
  neighbors.get(s)?.add(t);
  neighbors.get(t)?.add(s);
});

// ── Render links ────────────────────────────────────────────
const link = linkGroup.selectAll(".edge")
  .data(GRAPH.edges)
  .join("line")
  .attr("class", d => "edge " + d.type)
  .attr("stroke", d => d.type === "related" ? "#e8b84b" : "#4a4535")
  .style("opacity", d => edgeOpacity(d, false));

// ── Render nodes ────────────────────────────────────────────
const node = nodeGroup.selectAll(".node")
  .data(GRAPH.nodes)
  .join("g")
  .attr("class", "node")
  .call(d3.drag()
    .on("start", (ev, d) => { if (!ev.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on("drag",  (ev, d) => { d.fx = ev.x; d.fy = ev.y; })
    .on("end",   (ev, d) => { if (!ev.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }))
  .on("mouseover", onHover)
  .on("mouseout",  onHoverOut)
  .on("click", onClick);

node.append("circle")
  .attr("r", d => nodeRadius(d))
  .attr("fill", d => clusterColor(nodeComm(d)))
  .attr("stroke", d => d3.color(clusterColor(nodeComm(d))).brighter(0.8).toString())
  .attr("fill-opacity", 0.85);

node.append("text")
  .attr("dy", d => nodeRadius(d) + 9)
  .style("display", "none")
  .text(d => d.label);

// ── Positions UMAP ───────────────────────────────────────────
const padding = 60;
if (hasUMAP) {
  GRAPH.nodes.forEach(d => {
    if (d.umap_x != null) {
      d.x = padding + d.umap_x * (width  - padding * 2);
      d.y = padding + d.umap_y * (height - padding * 2);
    }
  });
}

// ── Simulation ────────────────────────────────────────────
let tickCount = 0;
const sim = hasUMAP
  ? d3.forceSimulation(GRAPH.nodes)
      .force("collision", d3.forceCollide().radius(d => nodeRadius(d) + 3).strength(0.6))
      .alphaDecay(0.04)
      .on("tick", onTick)
      .on("end", () => { statusEl.textContent = ""; })
  : d3.forceSimulation(GRAPH.nodes)
      .force("link", d3.forceLink(GRAPH.edges).id(d => d.id)
        .distance(d => d.type === "related" ? 75 : 115)
        .strength(d => d.type === "related" ? 0.8 : 0.25))
      .force("charge", d3.forceManyBody().strength(-160).distanceMax(450))
      .force("collision", d3.forceCollide().radius(d => nodeRadius(d) + 2))
      .force("center", d3.forceCenter(width / 2, height / 2))
      .alphaDecay(0.012)
      .on("tick", () => {
        tickCount++;
        if (tickCount % 15 === 0) {
          const pct = Math.round((1 - sim.alpha()) * 100);
          statusEl.textContent = "Simulating… " + pct + "%";
        }
        onTick();
      })
      .on("end", () => { statusEl.textContent = ""; });

function onTick() {
  link
    .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
  node.attr("transform", d => "translate(" + d.x + "," + d.y + ")");
}

// ── Hover ─────────────────────────────────────────────────
function onHover(event, d) {
  const nbrs = neighbors.get(d.id) || new Set();
  node.selectAll("circle")
    .attr("fill-opacity", n => n.id === d.id || nbrs.has(n.id) ? 1 : 0.12);
  link.style("opacity", e => {
    const s = e.source.id || e.source;
    const t = e.target.id || e.target;
    return (s === d.id || t === d.id) && showEdgeTypes[e.type] ? 0.9 : 0;
  });
}

function onHoverOut() {
  node.selectAll("circle").attr("fill-opacity", 0.85);
  linkGroup.selectAll(".edge").style("opacity", d => edgeOpacity(d, true));
  applyVisibility();
}

// ── Click ──────────────────────────────────────────────────
let selectedId = null;

function onClick(event, d) {
  if (selectedId === d.id) {
    selectedId = null;
    document.getElementById("detail-content").classList.remove("visible");
    document.getElementById("detail-placeholder").style.display = "";
    node.selectAll("circle")
      .attr("stroke-width", 1.5)
      .attr("stroke", n => d3.color(clusterColor(nodeComm(n))).brighter(0.8).toString());
    return;
  }

  selectedId = d.id;
  document.getElementById("detail-placeholder").style.display = "none";
  document.getElementById("detail-content").classList.add("visible");

  node.selectAll("circle")
    .attr("stroke-width", n => n.id === d.id ? 3 : 1.5)
    .attr("stroke", n => n.id === d.id
      ? "#f0e8cc"
      : d3.color(clusterColor(nodeComm(n))).brighter(0.8).toString());

  document.getElementById("detail-name").textContent = d.label;

  const dot = document.getElementById("detail-cluster-dot");
  dot.style.background = clusterColor(nodeComm(d));
  document.getElementById("detail-cluster-name").textContent =
    n_communities ? "community " + d.community : d.cluster;

  document.getElementById("detail-desc").textContent = d.description || "No description.";

  fillTags("detail-caps", "detail-caps-section", d.capabilities || []);
  fillTags("detail-reqs", "detail-reqs-section", d.requirements || []);

  const nbrs = Array.from(neighbors.get(d.id) || []);
  fillNeighbors("detail-neighbors", "detail-neighbors-section", nbrs);
}

function fillTags(listId, sectionId, items) {
  const section = document.getElementById(sectionId);
  const list = document.getElementById(listId);
  list.textContent = "";
  if (!items.length) { section.classList.remove("visible"); return; }
  section.classList.add("visible");
  items.forEach(text => {
    const span = document.createElement("span");
    span.className = "tag";
    span.textContent = text;
    list.appendChild(span);
  });
}

function fillNeighbors(listId, sectionId, nbrs) {
  const section = document.getElementById(sectionId);
  const list = document.getElementById(listId);
  list.textContent = "";
  if (!nbrs.length) { section.classList.remove("visible"); return; }
  section.classList.add("visible");

  nbrs.slice(0, 20).forEach(nid => {
    const nb = nodeById.get(nid);
    if (!nb) return;
    const el = document.createElement("div");
    el.className = "neighbor-item";
    el.textContent = nb.label;
    el.addEventListener("click", () => { zoomToNode(nb); onClick({}, nb); });
    list.appendChild(el);
  });

  if (nbrs.length > 20) {
    const more = document.createElement("div");
    more.className = "neighbor-more";
    more.textContent = "…and " + (nbrs.length - 20) + " more";
    list.appendChild(more);
  }
}

// ── Zoom to node ────────────────────────────────────────────
function zoomToNode(d, scale) {
  if (d.x == null || d.y == null) return;
  const k = scale || 3.5;
  const t = d3.zoomIdentity
    .translate(width / 2, height / 2)
    .scale(k)
    .translate(-d.x, -d.y);
  svg.transition().duration(700).call(zoomBehavior.transform, t);
}

// ── Search ────────────────────────────────────────────────
const searchEl  = document.getElementById("search");
const resultsEl = document.getElementById("search-results");

searchEl.addEventListener("input", () => {
  const q = searchEl.value.trim().toLowerCase();
  resultsEl.textContent = "";
  if (!q) { resultsEl.classList.remove("visible"); return; }

  const matches = GRAPH.nodes
    .filter(n => n.label.toLowerCase().includes(q) || n.id.includes(q))
    .slice(0, 12);

  if (!matches.length) { resultsEl.classList.remove("visible"); return; }

  resultsEl.classList.add("visible");
  matches.forEach(n => {
    const item = document.createElement("div");
    item.className = "search-item";

    const dot = document.createElement("div");
    dot.className = "cluster-dot";
    dot.style.background = clusterColor(nodeComm(n));

    const lbl = document.createElement("span");
    lbl.textContent = n.label;

    item.appendChild(dot);
    item.appendChild(lbl);
    item.addEventListener("click", () => {
      resultsEl.classList.remove("visible");
      searchEl.value = "";
      zoomToNode(n);
      onClick({}, n);
    });
    resultsEl.appendChild(item);
  });
});

searchEl.addEventListener("blur", () => {
  setTimeout(() => resultsEl.classList.remove("visible"), 200);
});

// ── Resize ────────────────────────────────────────────────
window.addEventListener("resize", () => {
  sim.force("center", d3.forceCenter(svgEl.clientWidth / 2, svgEl.clientHeight / 2));
});
</script>
</body>
</html>
